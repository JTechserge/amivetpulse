version: 2
updates:
  # Dépendances npm (Vite, Vitest, Playwright, ESLint…)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - vite
          - vitest
          - '@playwright/*'
          - 'eslint*'
          - '@eslint/*'

  # Actions GitHub (deploy, weekly-recap, security)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
