# Configuration gitleaks — Amivet PULSE
# Doc : https://github.com/gitleaks/gitleaks#configuration

[allowlist]
  description = "Faux positifs connus — clé anon publique et données de test"
  # src/config.js : clé anon Supabase intentionnellement publique (protégée par RLS).
  # tests/ : les fichiers de test utilisent des objets { key: '...' } qui déclenchent
  #   la règle generic-api-key sur le mot "key", même sans aucune valeur secrète.
  #   Les tests n'interagissent jamais avec de vraies APIs (pas de JWT, pas de service_role).
  paths = [
    '''src/config\.js''',
    '''tests/''',
  ]
